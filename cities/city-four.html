<!doctype html>
<html lang="en">
<head>
  <!-- ── CONFIG (loaded early for Meta Pixel) ──────────────────── -->
  <script src="../CONFIG.js"></script>
  <!-- ── Meta Pixel Base Code (reads CONFIG.metaPixelId) ───────── -->
  <script>
  (function() {
    if (!CONFIG.metaPixelId) return;
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', CONFIG.metaPixelId);
    fbq('track', 'PageView');
    document.write('<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=' + CONFIG.metaPixelId + '&ev=PageView&noscript=1"/></noscript>');
  })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Epoxy & Polyaspartic Flooring in City Four, ST | YOUR BUSINESS NAME</title>
  <meta name="description" content="YOUR BUSINESS NAME installs epoxy garage floors, polyaspartic coatings, and commercial flooring in City Four, ST. Free quotes. Written warranty." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=optional" rel="stylesheet" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>

<!-- ── CITY HERO ─────────────────────────────────────────────── -->
<section class="page-hero city-hero" id="city-hero">
  <div class="grid-overlay"></div>
  <div class="container-wide city-hero-inner">
    <div class="flex-1">
      <div class="page-hero-eyebrow" id="city-eyebrow"></div>
      <h1 class="city-headline" id="city-headline"></h1>
      <p class="city-sub" id="city-sub"></p>
      <div class="city-service-pills" id="city-service-pills"></div>
      <div class="city-rating">
        <div class="stars" id="city-stars"></div>
        <span class="city-rating-text" id="city-rating-text"></span>
      </div>
    </div>
    <div class="city-form-col">
      <div id="city-lead-form"></div>
    </div>
  </div>
</section>

<!-- ── WHY US IN THIS CITY ────────────────────────────────────── -->
<section class="section-y bg-white">
  <div class="container-wide">
    <div id="city-why-header"></div>
    <div class="city-why-grid" id="city-why-grid"></div>
  </div>
</section>

<!-- ── MAP ───────────────────────────────────────────────────── -->
<section class="section-y bg-slate-50">
  <div class="container-wide" style="max-width: 56rem; margin-inline: auto;">
    <div id="city-map-header"></div>
    <div id="city-map"></div>
  </div>
</section>

<!-- ── CITY FAQs ──────────────────────────────────────────────── -->
<section class="section-y bg-white">
  <div class="container-wide">
    <div id="city-faq-header"></div>
    <div id="city-faq-container"></div>
  </div>
</section>

<!-- ── CTA ────────────────────────────────────────────────────── -->
<div id="city-cta"></div><script src="../components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  // Read slug from URL: /your-city.html -> your-city
  const slug = window.location.pathname.split('/').pop().replace('.html', '');
  const area = CONFIG.serviceAreas.find(a => a.slug === slug);

  if (!area) {
    document.getElementById('city-hero').innerHTML = `
      <div class="container-wide" style="padding-top:8rem;padding-bottom:4rem;text-align:center;color:#fff">
        <h1 style="font-family:var(--font-display);font-size:2rem;font-weight:700">Location Not Found</h1>
        <p style="margin-top:1rem;color:rgba(255,255,255,0.8)">
          We may still serve your area!
          <a href="/contact.html" style="color:var(--color-primary);text-decoration:underline">Contact us</a> to find out.
        </p>
      </div>`;
    return;
  }

  const countyStr = area.county ? `, ${area.county} County` : '';

  // Meta
  document.title = `Epoxy & Polyaspartic Flooring in ${area.name}, ${CONFIG.stateShort} | ${CONFIG.businessName}`;
  document.querySelector('meta[name="description"]').setAttribute('content',
    `${CONFIG.businessName} installs epoxy garage floors, polyaspartic coatings, metallic epoxy and commercial flooring in ${area.name}${countyStr}, ${CONFIG.stateShort}. Free quotes. Written warranty. Call ${CONFIG.phone}.`
  );

  // Hero
  document.getElementById('city-eyebrow').textContent = `${CONFIG.businessName} · ${area.name}, ${CONFIG.stateShort}`;
  document.getElementById('city-headline').innerHTML = `Epoxy Flooring in <span style="color:var(--color-primary)">${area.name}</span>`;
  document.getElementById('city-sub').innerHTML = `Professional epoxy, polyaspartic, and metallic floor coatings for ${area.name} homeowners and businesses. Diamond-ground prep, premium materials, and a <strong>written workmanship warranty</strong>.`;
  document.getElementById('city-stars').innerHTML = renderStars(5);
  document.getElementById('city-rating-text').textContent = `${CONFIG.rating} stars · ${CONFIG.reviewCount} verified reviews`;

  // Service pills
  document.getElementById('city-service-pills').innerHTML = CONFIG.services.map(s => `
    <a href="../services/${s.slug}.html" class="city-service-pill">${s.name}</a>`).join('');

  // Lead form
  buildLeadForm('city-lead-form', { variant: 'card', showCity: true, showMessage: false });

  // Why us section
  document.getElementById('city-why-header').innerHTML = sectionHeaderHTML({
    eyebrow: area.name,
    title: `Why ${area.name} Homeowners & Businesses Choose ${CONFIG.businessName}`
  });
  const whyPoints = [
    `Local crew based in the ${area.county || CONFIG.city} area`,
    `${CONFIG.yearsExperience}+ years installing floors in ${area.name}`,
    "Diamond-ground prep on every single job",
    "100% solids epoxy and polyaspartic — no water-based fillers",
    "Written workmanship warranty on all installations",
    `${CONFIG.projectsCompleted} floors installed across the region`,
  ];
  document.getElementById('city-why-grid').innerHTML = whyPoints.map(item => `
    <div class="city-why-item">
      <svg class="why-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 11-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      <span>${item}</span>
    </div>`).join('');

  // Map
  document.getElementById('city-map-header').innerHTML = sectionHeaderHTML({
    eyebrow: 'Service Area',
    title: `We Come to You in ${area.name}`,
    subtitle: "Free site visits, no travel fees within our service zone."
  });
  document.getElementById('city-map').innerHTML = mapEmbedHTML(`${area.name} ${CONFIG.stateShort} epoxy flooring contractor`);

  // FAQs
  const cityFaqs = [
    {
      q: `Do you install epoxy floors throughout ${area.name}${countyStr}?`,
      a: `Yes — we cover all neighbourhoods and zip codes in ${area.name} with no travel surcharges. Our local crew can typically schedule a free site visit within 1–2 business days.`,
    },
    {
      q: `What types of floors do you coat in ${area.name}?`,
      a: `We install epoxy garage floors, polyaspartic coatings, metallic epoxy, commercial warehouse floors, pool deck coatings, and basement floor systems throughout ${area.name} and the surrounding area.`,
    },
    {
      q: `How much does epoxy flooring cost in ${area.name}?`,
      a: `Pricing depends on square footage, concrete condition, and the coating system chosen. A typical 2-car garage in ${area.name} ranges from $1,500–$3,500 for a full broadcast epoxy system with polyaspartic topcoat. We provide detailed written quotes at no charge.`,
    },
    {
      q: `How long does epoxy floor installation take in ${area.name}?`,
      a: `Most residential garages and basements in ${area.name} are completed in a single day. Commercial projects depend on square footage. Polyaspartic topcoats are ready for foot traffic in 4–6 hours and vehicle traffic in 24 hours.`,
    },
  ];

  document.getElementById('city-faq-header').innerHTML = sectionHeaderHTML({
    eyebrow: `${area.name} FAQ`,
    title: `Epoxy Flooring Questions from ${area.name} Customers`
  });
  renderFAQs('city-faq-container', cityFaqs);

  // CTA
  document.getElementById('city-cta').innerHTML = ctaSectionHTML({
    title: `Ready for a Better Floor in ${area.name}?`,
    subtitle: `Free, no-obligation quote from ${CONFIG.businessName}. We visit your site, assess the concrete, and deliver a written estimate — usually same day.`
  });
});
</script>

<style>
/* ── CITY PAGE STYLES ─────────────────────────────────────── */
.city-hero { padding-bottom: 5rem; }
.city-hero-inner {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 3rem;
  align-items: flex-start;
}
@media (min-width: 1024px) {
  .city-hero-inner { flex-direction: row; align-items: flex-start; }
}
.flex-1 { flex: 1; }
.city-headline { color: #fff; font-size: clamp(2rem, 5vw, 3.5rem); margin-bottom: 1.25rem; }
.city-sub { color: rgba(255,255,255,0.8); font-size: 1.125rem; max-width: 36rem; line-height: 1.65; margin-bottom: 2rem; }
.city-service-pills { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-bottom: 2rem; }
.city-service-pill {
  display: inline-block;
  padding: 0.5rem 1rem;
  border-radius: 9999px;
  border: 1px solid rgba(255,255,255,0.25);
  color: rgba(255,255,255,0.9);
  font-size: 0.875rem;
  text-decoration: none;
  transition: background 0.15s;
}
.city-service-pill:hover { background: rgba(255,255,255,0.1); }
.city-rating { display: flex; align-items: center; gap: 0.75rem; }
.city-rating-text { color: rgba(255,255,255,0.8); font-size: 0.875rem; }
.city-form-col { width: 100%; max-width: 22rem; }

/* Why grid */
.city-why-grid { display: grid; grid-template-columns: 1fr; gap: 1rem; max-width: 56rem; margin-inline: auto; }
@media (min-width: 768px) { .city-why-grid { grid-template-columns: repeat(2, 1fr); } }
.city-why-item {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 1rem;
  background: var(--color-slate-50);
  border-radius: 0.75rem;
  border: 1px solid var(--color-slate-200);
}
.city-why-item span { color: var(--color-navy); font-weight: 500; }
.why-check { width: 1.25rem; height: 1.25rem; color: var(--color-primary); flex-shrink: 0; margin-top: 0.125rem; }
</style>

</body>
</html>
