<!doctype html>
<html lang="en">
<head>
  <!-- ── CONFIG (loaded early for Meta Pixel) ──────────────────── -->
  <script src="../CONFIG.js"></script>
  <!-- ── PROJECTS (gallery photos — separate file, updates monthly) ── -->
  <script src="../PROJECTS.js"></script>
  <!-- ── Meta Pixel Base Code (reads CONFIG.metaPixelId) ───────── -->
  <script>
  (function() {
    if (!CONFIG.metaPixelId) return;
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', CONFIG.metaPixelId);
    fbq('track', 'PageView');
    document.write('<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=' + CONFIG.metaPixelId + '&ev=PageView&noscript=1"/></noscript>');
  })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Our Work | Portfolio</title>
  <meta name="description" content="See our portfolio of epoxy garage floors, metallic epoxy, commercial coatings, and pool deck installations." />
  <meta property="og:title" content="Our Work | Portfolio" />
  <meta property="og:description" content="See our portfolio of epoxy garage floors, metallic epoxy, commercial coatings, and pool deck installations." />
  <meta property="og:type" content="website" />
  <!-- og:image / twitter:image filled in by generate-pages.js from the top featured PROJECTS entry -->
  <meta property="og:image" content="" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=optional" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── PORTFOLIO HERO ─────────────────────────────────────────── -->
<section class="page-hero" style="background-color:var(--color-secondary); padding-bottom: 5rem;">
  <div class="grid-overlay"></div>
  <div class="container-wide" style="position:relative; max-width:48rem;">
    <div class="page-hero-eyebrow">Our Work</div>
    <h1 style="color:#fff; margin-bottom:1rem;">Floors We're Proud Of</h1>
    <p style="color:rgba(255,255,255,0.8); font-size:1.125rem; line-height:1.65;">
      Every project in our portfolio started with proper prep — diamond-ground concrete, crack repair, and moisture testing. The results speak for themselves.
    </p>
  </div>
</section>

<!-- ── FILTER BAR ─────────────────────────────────────────────── -->
<div class="portfolio-filter-bar bg-white">
  <div class="container-wide portfolio-filter-inner">
    <button class="filter-btn filter-btn-active" data-filter="all">All Projects</button>
    <div id="filter-btns"></div>
  </div>
</div>

<!-- ── PORTFOLIO GRID ─────────────────────────────────────────── -->
<section class="section-y bg-slate-50">
  <div class="container-wide">
    <div class="portfolio-grid" id="portfolio-grid"></div>
  </div>
</section>

<!-- ── SOCIAL PROOF STRIP ─────────────────────────────────────── -->
<section class="section-y bg-white">
  <div class="container-wide">
    <div id="portfolio-proof-header"></div>
    <div class="portfolio-reviews-row" id="portfolio-reviews-row"></div>
  </div>
</section>

<!-- ── CTA ────────────────────────────────────────────────────── -->
<div id="portfolio-cta"></div>

<!-- ── LIGHTBOX ──────────────────────────────────────────────── -->
<div id="lightbox" class="lightbox" style="display:none">
  <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <img src="" alt="" id="lightbox-img" class="lightbox-img" />
    <div class="lightbox-caption" id="lightbox-caption"></div>
  </div>
</div><script src="components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.title = `Our Work | Portfolio | ${CONFIG.businessName}`;

  // Build unique category list
  const cats = [...new Set(PROJECTS.map(p => p.category))];

  // Filter buttons
  document.getElementById('filter-btns').innerHTML = cats.map(c => `
    <button class="filter-btn" data-filter="${c}">${c}</button>`).join('');

  // Render portfolio grid
  function renderGrid(filter) {
    const projects = filter === 'all'
      ? PROJECTS
      : PROJECTS.filter(p => p.category === filter);

    document.getElementById('portfolio-grid').innerHTML = projects.map((p, i) => `
      <div class="portfolio-item" data-category="${p.category}">
        <button class="portfolio-img-btn" data-img="${p.img}" data-title="${p.title}" data-cat="${p.category}" aria-label="Open ${p.title}">
          <img src="${p.img}" alt="${p.alt}" width="${p.width}" height="${p.height}" class="portfolio-img" loading="${i < 6 ? 'eager' : 'lazy'}" />
          <div class="portfolio-overlay">
            <div class="portfolio-overlay-inner">
              <div class="portfolio-cat-badge">${p.category}</div>
              <div class="portfolio-project-title">${p.title}</div>
            </div>
          </div>
        </button>
      </div>`).join('');

    // Attach lightbox listeners to new buttons
    document.querySelectorAll('.portfolio-img-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        openLightbox(btn.dataset.img, btn.dataset.title, btn.dataset.cat);
      });
    });
  }

  renderGrid('all');

  // JSON-LD: ItemList of ImageObject, sourced from PROJECTS
  const portfolioJsonLd = {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "itemListElement": PROJECTS.map((p, i) => ({
      "@type": "ListItem",
      "position": i + 1,
      "item": {
        "@type": "ImageObject",
        "contentUrl": p.img,
        "name": p.title,
        "description": p.alt,
        "width": p.width,
        "height": p.height
      }
    }))
  };
  const ldScript = document.createElement('script');
  ldScript.type = 'application/ld+json';
  ldScript.textContent = JSON.stringify(portfolioJsonLd);
  document.head.appendChild(ldScript);

  // Filter click handling
  document.querySelector('.portfolio-filter-inner').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-btn-active'));
    btn.classList.add('filter-btn-active');
    renderGrid(btn.dataset.filter);
  });

  // Lightbox
  function openLightbox(src, title, cat) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-img').alt = title;
    document.getElementById('lightbox-caption').textContent = `${title} — ${cat}`;
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

  // Reviews strip
  document.getElementById('portfolio-proof-header').innerHTML = sectionHeaderHTML({
    eyebrow: 'What Customers Say',
    title: 'Real Reviews from Real Projects'
  });
  document.getElementById('portfolio-reviews-row').innerHTML = CONFIG.testimonials.slice(0, 3).map(t => `
    <div class="portfolio-review-card">
      <div class="stars">${renderStars(t.stars)}</div>
      <p class="portfolio-review-text">"${t.text}"</p>
      <div class="portfolio-review-name">${t.name} · ${t.location}</div>
    </div>`).join('');

  // CTA
  document.getElementById('portfolio-cta').innerHTML = ctaSectionHTML({
    title: "Want a Floor Like These?",
    subtitle: "Free site visit and written quote. Most installs completed in one day."
  });
});
</script>

<style>
/* ── PORTFOLIO PAGE STYLES ──────────────────────────────── */
/* Note: .portfolio-grid, .portfolio-item, .portfolio-img-btn,
   .portfolio-img, .portfolio-overlay*, .portfolio-cat-badge, and
   .portfolio-project-title now live in styles.css (shared) so the
   home page "Recent Work" section can reuse them. */
.portfolio-filter-bar {
  border-bottom: 1px solid var(--color-slate-200);
  position: sticky;
  top: 5rem;
  z-index: 30;
}
.portfolio-filter-inner {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  padding-block: 1rem;
  overflow-x: auto;
}
.filter-btn {
  padding: 0.5rem 1.25rem;
  border-radius: 9999px;
  border: 1.5px solid var(--color-slate-200);
  background: #fff;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--color-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.filter-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.filter-btn-active {
  background-color: var(--color-secondary);
  border-color: var(--color-secondary);
  color: #fff;
}
.filter-btn-active:hover { color: #fff; }

.portfolio-reviews-row { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
@media (min-width: 768px) { .portfolio-reviews-row { grid-template-columns: repeat(3, 1fr); } }
.portfolio-review-card {
  background: var(--color-slate-50);
  border: 1px solid var(--color-slate-200);
  border-radius: var(--radius-2xl);
  padding: 1.5rem;
}
.portfolio-review-text { font-size: 0.9375rem; color: var(--color-navy); font-weight: 500; line-height: 1.65; margin-top: 0.75rem; margin-bottom: 0.75rem; }
.portfolio-review-name { font-size: 0.75rem; font-weight: 600; color: var(--color-muted); }

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fade-up 0.2s ease;
}
.lightbox-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.9); }
.lightbox-content {
  position: relative;
  z-index: 1;
  max-width: 90vw;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}
.lightbox-close {
  position: absolute;
  top: -2.5rem;
  right: 0;
  color: #fff;
  font-size: 2rem;
  line-height: 1;
  background: none;
  border: none;
  cursor: pointer;
  opacity: 0.8;
  transition: opacity 0.15s;
}
.lightbox-close:hover { opacity: 1; }
.lightbox-img {
  max-width: 90vw;
  max-height: 80vh;
  border-radius: var(--radius-xl);
  object-fit: contain;
  box-shadow: var(--shadow-2xl);
}
.lightbox-caption { color: rgba(255,255,255,0.8); font-size: 0.875rem; text-align: center; }
</style>

</body>
</html>
