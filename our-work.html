<!doctype html>
<html lang="en">
<head>
  <!-- ── CONFIG (loaded early for Meta Pixel) ──────────────────── -->
  <script src="CONFIG.js"></script>
  <!-- ── PROJECTS (gallery photos — separate file, updates monthly) ── -->
  <script src="PROJECTS.js"></script>
  <!-- ── Meta Pixel Base Code (reads CONFIG.metaPixelId) ───────── -->
  <script>
  (function() {
    if (!CONFIG.metaPixelId) return;
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', CONFIG.metaPixelId);
    fbq('track', 'PageView');
    document.write('<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=' + CONFIG.metaPixelId + '&ev=PageView&noscript=1"/></noscript>');
  })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Our Work | Portfolio</title>
  <meta name="description" content="See our portfolio of epoxy garage floors, metallic epoxy, commercial coatings, and pool deck installations." />
  <meta property="og:title" content="Our Work | Portfolio" />
  <meta property="og:description" content="See our portfolio of epoxy garage floors, metallic epoxy, commercial coatings, and pool deck installations." />
  <meta property="og:type" content="website" />
  <!-- og:image / twitter:image filled in by generate-pages.js from the top featured PROJECTS entry -->
  <meta property="og:image" content="https://images.unsplash.com/photo-1558618047-f4e60cef8b3e?w=800&q=80" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:image" content="https://images.unsplash.com/photo-1558618047-f4e60cef8b3e?w=800&q=80" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=optional" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- ── PORTFOLIO HERO ─────────────────────────────────────────── -->
<section class="page-hero" style="background-color:var(--color-secondary); padding-bottom: 5rem;">
  <div class="grid-overlay"></div>
  <div class="container-wide" style="position:relative; max-width:48rem;">
    <div class="page-hero-eyebrow">Our Work</div>
    <h1 style="color:#fff; margin-bottom:1rem;">Floors We're Proud Of</h1>
    <p style="color:rgba(255,255,255,0.8); font-size:1.125rem; line-height:1.65;">
      Every project in our portfolio started with proper prep — diamond-ground concrete, crack repair, and moisture testing. The results speak for themselves.
    </p>
  </div>
</section>

<!-- ── FILTER BAR ─────────────────────────────────────────────── -->
<div class="portfolio-filter-bar bg-white">
  <div class="container-wide portfolio-filter-inner">
    <button class="filter-btn filter-btn-active" data-filter="all">All Projects</button>
    <div id="filter-btns"></div>
  </div>
</div>

<!-- ── PORTFOLIO GRID ─────────────────────────────────────────── -->
<section class="section-y bg-slate-50">
  <div class="container-wide">
    <div class="portfolio-gallery" id="portfolio-gallery">
      <div class="portfolio-gallery-viewport">
        <div class="portfolio-grid" id="portfolio-grid"></div>
      </div>
      <div class="portfolio-gallery-controls">
        <div class="portfolio-gallery-dots" id="portfolio-dots" aria-label="Project gallery pagination"></div>
        <div class="portfolio-gallery-nav">
          <button type="button" class="portfolio-gallery-arrow" id="portfolio-prev" aria-label="Previous project slide">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button type="button" class="portfolio-gallery-arrow" id="portfolio-next" aria-label="Next project slide">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- ── SOCIAL PROOF STRIP ─────────────────────────────────────── -->
<section class="section-y bg-white">
  <div class="container-wide">
    <div id="portfolio-proof-header"></div>
    <div class="portfolio-reviews-row" id="portfolio-reviews-row"></div>
  </div>
</section>

<!-- ── CTA ────────────────────────────────────────────────────── -->
<div id="portfolio-cta"></div>

<!-- ── LIGHTBOX ──────────────────────────────────────────────── -->
<div id="lightbox" class="lightbox" style="display:none">
  <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
  <div class="lightbox-content">
    <button class="lightbox-close" id="lightbox-close">&times;</button>
    <img src="" alt="" id="lightbox-img" class="lightbox-img" />
    <div class="lightbox-caption" id="lightbox-caption"></div>
  </div>
</div><script src="components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.title = `Our Work | Portfolio | ${CONFIG.businessName}`;
  const projectsNewestFirst = [...PROJECTS].sort((a, b) => {
    const aTime = a.publishedAt ? new Date(a.publishedAt).getTime() : 0;
    const bTime = b.publishedAt ? new Date(b.publishedAt).getTime() : 0;
    return bTime - aTime;
  });
  let activeProjects = projectsNewestFirst;

  // Build unique category list
  const cats = [...new Set(projectsNewestFirst.map(p => p.category))];

  // Filter buttons
  document.getElementById('filter-btns').innerHTML = cats.map(c => `
    <button class="filter-btn" data-filter="${c}">${c}</button>`).join('');

  initProjectGallery({
    galleryId: 'portfolio-gallery',
    trackId: 'portfolio-grid',
    dotsId: 'portfolio-dots',
    prevId: 'portfolio-prev',
    nextId: 'portfolio-next',
    getProjects: () => activeProjects,
    onCardClick: (button) => openLightbox(button.dataset.img, button.dataset.title, button.dataset.cat),
  });

  // JSON-LD: ItemList of ImageObject, sourced from PROJECTS
  const portfolioJsonLd = {
    "@context": "https://schema.org",
    "@type": "ItemList",
    "itemListElement": projectsNewestFirst.map((p, i) => ({
      "@type": "ListItem",
      "position": i + 1,
      "item": {
        "@type": "ImageObject",
        "contentUrl": p.img,
        "name": p.title,
        "description": p.alt,
        "width": p.width,
        "height": p.height
      }
    }))
  };
  const ldScript = document.createElement('script');
  ldScript.type = 'application/ld+json';
  ldScript.textContent = JSON.stringify(portfolioJsonLd);
  document.head.appendChild(ldScript);

  // Filter click handling
  document.querySelector('.portfolio-filter-inner').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('filter-btn-active'));
    btn.classList.add('filter-btn-active');
    activeProjects = btn.dataset.filter === 'all'
      ? projectsNewestFirst
      : projectsNewestFirst.filter(p => p.category === btn.dataset.filter);
    window.dispatchEvent(new CustomEvent('portfolio:filter-change'));
  });

  // Lightbox
  function openLightbox(src, title, cat) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox-img').alt = title;
    document.getElementById('lightbox-caption').textContent = `${title} — ${cat}`;
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }
  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-backdrop').addEventListener('click', closeLightbox);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeLightbox(); });

  // Reviews strip
  document.getElementById('portfolio-proof-header').innerHTML = sectionHeaderHTML({
    eyebrow: 'What Customers Say',
    title: 'Real Reviews from Real Projects'
  });
  document.getElementById('portfolio-reviews-row').innerHTML = CONFIG.testimonials.slice(0, 3).map(t => `
    <div class="portfolio-review-card">
      <div class="stars">${renderStars(t.stars)}</div>
      <p class="portfolio-review-text">"${t.text}"</p>
      <div class="portfolio-review-name">${t.name} · ${t.location}</div>
    </div>`).join('');

  // CTA
  document.getElementById('portfolio-cta').innerHTML = ctaSectionHTML({
    title: "Want a Floor Like These?",
    subtitle: "Free site visit and written quote. Most installs completed in one day."
  });

  function initProjectGallery({
    galleryId,
    trackId,
    dotsId,
    prevId,
    nextId,
    getProjects,
    onCardClick,
  }) {
    const gallery = document.getElementById(galleryId);
    const track = document.getElementById(trackId);
    const dots = document.getElementById(dotsId);
    const prevBtn = document.getElementById(prevId);
    const nextBtn = document.getElementById(nextId);

    if (!gallery || !track || !dots || !prevBtn || !nextBtn) return;

    const autoplayDelay = 5000;
    let slides = [];
    let currentIndex = 0;
    let autoplayId = null;
    let resizeTimer = null;
    let startX = 0;
    let deltaX = 0;
    let isPointerDown = false;
    let suppressClick = false;

    const getItemsPerSlide = () => {
      if (window.innerWidth >= 1024) return 4;
      if (window.innerWidth >= 640) return 2;
      return 1;
    };

    const buildCard = (project, index, eagerCount) => `
      <div class="portfolio-item" data-category="${project.category}">
        <button
          type="button"
          class="portfolio-img-btn portfolio-card"
          data-img="${project.img}"
          data-title="${project.title}"
          data-cat="${project.category}"
          aria-label="Open ${project.title}"
        >
          <img
            src="${project.img}"
            alt="${project.alt}"
            width="${project.width}"
            height="${project.height}"
            class="portfolio-img"
            loading="${index < eagerCount ? 'eager' : 'lazy'}"
            sizes="(min-width: 1024px) 23vw, (min-width: 640px) 46vw, 90vw"
            draggable="false"
          />
          <div class="portfolio-overlay">
            <div class="portfolio-overlay-inner">
              <div class="portfolio-cat-badge">${project.category}</div>
              <div class="portfolio-project-title">${project.title}</div>
            </div>
          </div>
        </button>
      </div>`;

    const updateButtons = () => {
      const hasMultipleSlides = slides.length > 1;
      prevBtn.disabled = !hasMultipleSlides;
      nextBtn.disabled = !hasMultipleSlides;
      dots.querySelectorAll('.portfolio-gallery-dot').forEach((dot, index) => {
        const isActive = index === currentIndex;
        dot.classList.toggle('is-active', isActive);
        dot.setAttribute('aria-pressed', String(isActive));
      });
    };

    const updatePosition = (animate = true) => {
      track.style.transition = animate ? '' : 'none';
      track.style.transform = `translateX(calc(${-100 * currentIndex}% - ${1.25 * currentIndex}rem))`;
      updateButtons();
    };

    const goToSlide = (index, animate = true) => {
      if (!slides.length) return;
      currentIndex = (index + slides.length) % slides.length;
      updatePosition(animate);
    };

    const restartAutoplay = () => {
      window.clearInterval(autoplayId);
      if (slides.length <= 1) return;
      autoplayId = window.setInterval(() => goToSlide(currentIndex + 1), autoplayDelay);
    };

    const bindCardInteractions = () => {
      track.querySelectorAll('.portfolio-img-btn').forEach((button) => {
        button.addEventListener('click', (event) => {
          if (suppressClick) {
            event.preventDefault();
            suppressClick = false;
            return;
          }
          onCardClick(button);
        });
      });
    };

    const renderSlides = () => {
      const projects = getProjects();
      if (!projects.length) {
        track.innerHTML = '<div class="portfolio-gallery-empty">No projects found for this filter yet.</div>';
        dots.innerHTML = '';
        prevBtn.disabled = true;
        nextBtn.disabled = true;
        return;
      }

      const itemsPerSlide = getItemsPerSlide();
      const eagerCount = itemsPerSlide;
      slides = [];
      for (let i = 0; i < projects.length; i += itemsPerSlide) {
        slides.push(projects.slice(i, i + itemsPerSlide));
      }
      currentIndex = Math.min(currentIndex, slides.length - 1);
      track.innerHTML = slides.map((slide, slideIndex) => `
        <div class="portfolio-slide" data-slide-index="${slideIndex}">
          ${slide.map((project, itemIndex) => buildCard(project, slideIndex * itemsPerSlide + itemIndex, eagerCount)).join('')}
        </div>
      `).join('');
      dots.innerHTML = slides.map((_, index) => `
        <button type="button" class="portfolio-gallery-dot${index === currentIndex ? ' is-active' : ''}" data-dot-index="${index}" aria-label="Go to project slide ${index + 1}" aria-pressed="${index === currentIndex ? 'true' : 'false'}"></button>
      `).join('');
      bindCardInteractions();
      updatePosition(false);
    };

    const finishGesture = () => {
      if (!isPointerDown) return;
      isPointerDown = false;
      track.classList.remove('is-dragging');
      if (Math.abs(deltaX) > 50) {
        goToSlide(currentIndex + (deltaX < 0 ? 1 : -1));
        suppressClick = true;
      } else {
        updatePosition();
      }
      deltaX = 0;
      restartAutoplay();
    };

    prevBtn.addEventListener('click', () => {
      goToSlide(currentIndex - 1);
      restartAutoplay();
    });
    nextBtn.addEventListener('click', () => {
      goToSlide(currentIndex + 1);
      restartAutoplay();
    });
    dots.addEventListener('click', (event) => {
      const button = event.target.closest('[data-dot-index]');
      if (!button) return;
      goToSlide(Number(button.dataset.dotIndex));
      restartAutoplay();
    });
    gallery.addEventListener('pointerdown', (event) => {
      if (slides.length <= 1 || (event.pointerType === 'mouse' && event.button !== 0)) return;
      isPointerDown = true;
      startX = event.clientX;
      deltaX = 0;
      suppressClick = false;
      track.classList.add('is-dragging');
      window.clearInterval(autoplayId);
    });
    gallery.addEventListener('pointermove', (event) => {
      if (!isPointerDown) return;
      deltaX = event.clientX - startX;
    });
    gallery.addEventListener('pointerup', finishGesture);
    gallery.addEventListener('pointercancel', finishGesture);
    gallery.addEventListener('pointerleave', finishGesture);
    gallery.addEventListener('dragstart', (event) => event.preventDefault());
    gallery.addEventListener('mouseenter', () => window.clearInterval(autoplayId));
    gallery.addEventListener('mouseleave', restartAutoplay);
    gallery.addEventListener('focusin', () => window.clearInterval(autoplayId));
    gallery.addEventListener('focusout', restartAutoplay);
    window.addEventListener('resize', () => {
      window.clearTimeout(resizeTimer);
      resizeTimer = window.setTimeout(() => {
        renderSlides();
        restartAutoplay();
      }, 120);
    });
    window.addEventListener('portfolio:filter-change', () => {
      currentIndex = 0;
      renderSlides();
      restartAutoplay();
    });

    renderSlides();
    restartAutoplay();
  }
});
</script>

<style>
/* ── PORTFOLIO PAGE STYLES ──────────────────────────────── */
/* Note: .portfolio-grid, .portfolio-item, .portfolio-img-btn,
   .portfolio-img, .portfolio-overlay*, .portfolio-cat-badge, and
   .portfolio-project-title now live in styles.css (shared) so the
   home page "Recent Work" section can reuse them. */
.portfolio-filter-bar {
  border-bottom: 1px solid var(--color-slate-200);
  position: sticky;
  top: 5rem;
  z-index: 30;
}
.portfolio-filter-inner {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  flex-wrap: wrap;
  padding-block: 1rem;
  overflow-x: auto;
}
.filter-btn {
  padding: 0.5rem 1.25rem;
  border-radius: 9999px;
  border: 1.5px solid var(--color-slate-200);
  background: #fff;
  font-size: 0.875rem;
  font-weight: 500;
  color: var(--color-muted);
  cursor: pointer;
  white-space: nowrap;
  transition: border-color 0.15s, color 0.15s, background 0.15s;
}
.filter-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
.filter-btn-active {
  background-color: var(--color-secondary);
  border-color: var(--color-secondary);
  color: #fff;
}
.filter-btn-active:hover { color: #fff; }

.portfolio-reviews-row { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
@media (min-width: 768px) { .portfolio-reviews-row { grid-template-columns: repeat(3, 1fr); } }
.portfolio-review-card {
  background: var(--color-slate-50);
  border: 1px solid var(--color-slate-200);
  border-radius: var(--radius-2xl);
  padding: 1.5rem;
}
.portfolio-review-text { font-size: 0.9375rem; color: var(--color-navy); font-weight: 500; line-height: 1.65; margin-top: 0.75rem; margin-bottom: 0.75rem; }
.portfolio-review-name { font-size: 0.75rem; font-weight: 600; color: var(--color-muted); }

/* Lightbox */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 9999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  animation: fade-up 0.2s ease;
}
.lightbox-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.9); }
.lightbox-content {
  position: relative;
  z-index: 1;
  max-width: 90vw;
  max-height: 90vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.75rem;
}
.lightbox-close {
  position: absolute;
  top: -2.5rem;
  right: 0;
  color: #fff;
  font-size: 2rem;
  line-height: 1;
  background: none;
  border: none;
  cursor: pointer;
  opacity: 0.8;
  transition: opacity 0.15s;
}
.lightbox-close:hover { opacity: 1; }
.lightbox-img {
  max-width: 90vw;
  max-height: 80vh;
  border-radius: var(--radius-xl);
  object-fit: contain;
  box-shadow: var(--shadow-2xl);
}
.lightbox-caption { color: rgba(255,255,255,0.8); font-size: 0.875rem; text-align: center; }
</style>

</body>
</html>
