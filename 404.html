<!doctype html>
<html lang="en">
<head>
  <!-- ── CONFIG (loaded early for Meta Pixel) ──────────────────── -->
  <script src="CONFIG.js"></script>
  <!-- ── Meta Pixel Base Code (reads CONFIG.metaPixelId) ───────── -->
  <script>
  (function() {
    if (!CONFIG.metaPixelId) return;
    !function(f,b,e,v,n,t,s)
    {if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};
    if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';
    n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];
    s.parentNode.insertBefore(t,s)}(window, document,'script',
    'https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', CONFIG.metaPixelId);
    fbq('track', 'PageView');
    document.write('<noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=' + CONFIG.metaPixelId + '&ev=PageView&noscript=1"/></noscript>');
  })();
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <title>Page Not Found | 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700;800&family=Inter:wght@400;500;600&display=optional" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<section class="notfound-section">
  <div class="grid-overlay"></div>
  <div class="notfound-inner">
    <!-- Floor icon -->
    <div class="notfound-icon">
      <svg viewBox="0 0 24 24" fill="none" class="notfound-svg">
        <rect x="3" y="14" width="18" height="3" rx="1" fill="currentColor" opacity="0.5"/>
        <rect x="3" y="10" width="18" height="3" rx="1" fill="currentColor" opacity="0.75"/>
        <rect x="3" y="6" width="18" height="3" rx="1" fill="currentColor"/>
      </svg>
    </div>
    <div class="notfound-code">404</div>
    <h1 class="notfound-title">Page Not Found</h1>
    <p class="notfound-sub">
      Looks like this floor hasn't been installed yet.<br/>
      Let's get you back to solid ground.
    </p>
    <div class="notfound-btns">
      <a href="/" class="btn-primary btn-lg">Go to Homepage</a>
      <a href="/contact.html" class="btn-outline btn-lg">Get a Free Quote</a>
    </div>
    <!-- Quick links -->
    <div class="notfound-links">
      <p class="notfound-links-label">Quick links:</p>
      <div class="notfound-links-row" id="notfound-quick-links"></div>
    </div>
  </div>
</section><script src="components.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  document.title = `Page Not Found | ${CONFIG.businessName}`;
  const links = [
    { label: 'Services', href: '/index.html#services' },
    { label: 'Our Work', href: '/pages/our-work.html' },
    { label: 'About', href: '/pages/about.html' },
    { label: 'Contact', href: '/pages/contact.html' },
  ];
  document.getElementById('notfound-quick-links').innerHTML = links.map(l =>
    `<a href="${l.href}" class="notfound-link">${l.label}</a>`
  ).join('');
});
</script>

<style>
/* ── 404 PAGE STYLES ────────────────────────────────────── */
.notfound-section {
  min-height: 100svh;
  background-color: var(--color-secondary);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}
.notfound-inner {
  position: relative;
  text-align: center;
  color: #fff;
  padding: 2rem;
  max-width: 36rem;
}
.notfound-icon {
  width: 4rem;
  height: 4rem;
  border-radius: 1rem;
  background-color: var(--color-primary);
  display: grid;
  place-items: center;
  margin-inline: auto;
  margin-bottom: 1.5rem;
}
.notfound-svg { width: 2rem; height: 2rem; color: #fff; }
.notfound-code {
  font-family: var(--font-display);
  font-size: 6rem;
  font-weight: 800;
  color: rgba(255,255,255,0.1);
  line-height: 1;
  margin-bottom: -1.5rem;
}
.notfound-title {
  font-family: var(--font-display);
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 700;
  color: #fff;
  margin-bottom: 1rem;
}
.notfound-sub {
  color: rgba(255,255,255,0.75);
  font-size: 1.125rem;
  line-height: 1.65;
  margin-bottom: 2.5rem;
}
.notfound-btns { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-bottom: 3rem; }
.notfound-links-label { color: rgba(255,255,255,0.5); font-size: 0.875rem; margin-bottom: 0.75rem; }
.notfound-links-row { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; }
.notfound-link {
  padding: 0.5rem 1.25rem;
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 9999px;
  color: rgba(255,255,255,0.8);
  font-size: 0.875rem;
  text-decoration: none;
  transition: background 0.15s;
}
.notfound-link:hover { background: rgba(255,255,255,0.1); color: #fff; }
</style>

</body>
</html>
